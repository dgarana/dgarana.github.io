---
layout: default
---
<article class="page wrapper">

  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.subtitle %}
      <p class="page-subtitle">{{ page.subtitle }}</p>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>

</article>
